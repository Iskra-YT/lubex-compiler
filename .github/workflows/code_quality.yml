name: Code Quality

on:
  push:
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install clang-format
        run: sudo apt update && sudo apt install -y clang-format-15

      - name: Check C++ formatting
        run: |
          find compiler/ runtime/ standard/ \
            \( -path "*/build/*" -o -path "*/extern/*" \) -prune -o \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \) \
            -print | xargs -r clang-format-15 --dry-run --Werror

  include-guard-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check include guards in headers
        run: |
          errors=0
          while IFS= read -r header; do
            basename=$(basename "$header" | tr '[:lower:]' '[:upper:]' | tr '.' '_')
            if ! grep -q "${basename}_HPP\|${basename}_H" "$header"; then
              echo "Missing include guard in: $header"
              errors=$((errors + 1))
            fi
          done < <(find compiler/ runtime/ standard/ \
            \( -path "*/build/*" -o -path "*/extern/*" \) -prune -o \
            -name '*.hpp' -o -name '*.h' -print)

          if [ "$errors" -gt 0 ]; then
            echo "Found $errors headers without proper include guards."
            exit 1
          fi

          echo "All headers have proper include guards."