name: CMake Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Install LLVM Dev (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang
          export LLVM_DIR=/usr/lib/llvm-15/lib/cmake/llvm
          echo "LLVM_DIR=$LLVM_DIR" >> $GITHUB_ENV

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run build script (Linux)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        run: |
          chmod +x ./build.sh
          ./build.sh -DCMAKE_PREFIX_PATH="$LLVM_DIR"

      - name: Run test script (Linux)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        run: |
          chmod +x ./test.sh
          ./test.sh

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: build/**
